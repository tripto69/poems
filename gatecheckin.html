<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NMF Gate Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        * { transition: all 0.3s ease; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; text-align: center; margin: 0; padding: 20px; background-color: rgb(14, 5, 29); color: #ffffff; }
        .container { max-width: 500px; margin: auto; padding: 25px 20px; background: rgba(255, 255, 255, 0.03); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        
        .event-logo { max-width: 140px; margin-bottom: 15px; border-radius: 8px; }

        button { padding: 14px 20px; margin: 10px 0; cursor: pointer; font-size: 15px; font-weight: 600; border-radius: 8px; border: none; background-color: rgb(231, 43, 85); color: white; width: 100%; letter-spacing: 0.5px; }
        button:hover, button:active { background-color: rgb(200, 30, 70); transform: scale(0.98); }
        .outline-btn { background-color: transparent; border: 1px solid rgb(231, 43, 85); color: rgb(231, 43, 85); }
        .success-btn { background-color: #28a745; border: none; color: white; box-shadow: 0 0 15px rgba(40, 167, 69, 0.4); }
        .success-btn:hover { background-color: #218838; }
        
        input, select { width: 100%; padding: 14px; margin: 10px 0; background-color: rgba(25, 15, 45, 0.8); color: white; border: 1px solid rgba(231, 43, 85, 0.4); border-radius: 8px; font-size: 15px; outline: none; font-family: 'Montserrat', sans-serif; }
        input::placeholder { color: #888; font-weight: 400; }
        input:focus, select:focus { border-color: rgb(231, 43, 85); box-shadow: 0 0 8px rgba(231, 43, 85, 0.3); }
        select option { background-color: rgb(25, 15, 45); }
        
        #scanner-section, #login-section { display: none; opacity: 0; }
        .active { display: block !important; opacity: 1 !important; }
        
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        .search-box select { width: 35%; margin: 0; padding: 12px; cursor: pointer; }
        .search-box input { width: 65%; margin: 0; }
        .search-box button { width: auto; margin: 0; padding: 12px 18px; }
        
        #reader { width: 100%; margin-top: 10px; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid rgba(231, 43, 85, 0.5); }
        #loader { display: none; color: #0dcaf0; margin: 15px 0; font-weight: 600; font-size: 16px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: rgb(25, 15, 45); padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: left; border: 1px solid; position: relative; max-height: 90vh; overflow-y: auto; }
        .modal-content h3 { margin-top: 0; text-align: center; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; }
        .modal-detail { margin: 12px 0; font-size: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 10px; color: #ddd; }
        .modal-detail strong { color: #fff; font-weight: 600; }
        
        .badge { display: inline-block; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 700; float: right; letter-spacing: 0.5px; text-transform: uppercase; }
        .badge-th { background: #ffc107; color: #000; box-shadow: 0 0 8px rgba(255, 193, 7, 0.3); }
        .badge-reg { background: #0dcaf0; color: #000; box-shadow: 0 0 8px rgba(13, 202, 240, 0.3); }
        
        .status-success { border-color: #28a745; box-shadow: 0 0 20px rgba(40, 167, 69, 0.2); }
        .status-success h3 { color: #28a745; }
        .status-error { border-color: #dc3545; box-shadow: 0 0 20px rgba(220, 53, 69, 0.2); }
        .status-error h3 { color: #dc3545; }
        .status-verified { border-color: #0dcaf0; box-shadow: 0 0 20px rgba(13, 202, 240, 0.2); }
        .status-verified h3 { color: #0dcaf0; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.08); padding-bottom: 15px; margin-bottom: 20px; }
        .header-bar h2 { margin: 0; font-size: 18px; font-weight: 600; }
        .logout-btn { background: transparent; border: 1px solid rgba(231, 43, 85, 0.6); color: rgb(231, 43, 85); padding: 5px 12px; width: auto; font-size: 13px; margin: 0; border-radius: 6px; }
        .logout-btn:hover { background: rgba(231, 43, 85, 0.1); }
        
        .action-buttons { display: flex; gap: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <img src="logo.png" alt="Event Logo" class="event-logo">

        <div id="login-section" class="active">
            <h2 style="margin-bottom: 5px; font-weight: 700;">Guard Portal</h2>
            <p style="color: #888; margin-top: 0; margin-bottom: 20px; font-size: 14px;">Authorized Access Only</p>
            
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="pin" placeholder="Password">
            <button onclick="login()" id="loginBtn">Access System</button>
            <div id="login-message" style="margin-top: 15px; font-weight: 600; font-size: 14px;"></div>
        </div>

        <div id="scanner-section">
            <div class="header-bar">
                <h2>Live Scanner</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            
            <div class="search-box">
                <select id="searchType">
                    <option value="nmf_id">NMF ID</option>
                    <option value="phone">Phone No.</option>
                    <option value="email">Email</option>
                </select>
                <input type="text" id="manualSearch" placeholder="Enter details...">
                <button onclick="handleManualSearch()">Search</button>
            </div>

            <div id="loader">Communicating with NocoDB...</div>

            <div id="reader"></div>
            <button id="scanBtn" onclick="startScanner()" style="margin-top: 15px;">Open Camera</button>
            
            <p style="margin: 15px 0; color: #666; font-size: 13px; font-weight: 600;">— OR —</p>
            <input type="file" id="qr-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            <button class="outline-btn" onclick="document.getElementById('qr-upload').click()">Upload QR Image</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content" id="modalBox">
            <h3 id="modalTitle">STATUS</h3>
            <div id="participantDetails" style="display: none;">
                <div class="modal-detail" style="border:none; padding-bottom:0; margin-top: 0;">
                    <span id="m-type" class="badge"></span>
                    <div style="clear:both;"></div>
                </div>
                <div class="modal-detail"><strong>Name:</strong> <span id="m-name"></span></div>
                <div class="modal-detail"><strong>ID:</strong> <span id="m-id"></span></div>
                <div class="modal-detail"><strong>Institution:</strong> <span id="m-inst"></span></div>
                
                <div id="th-details" style="display: none;">
                    <div class="modal-detail"><strong>Team Name:</strong> <span id="m-team" style="color: #ffc107;"></span></div>
                    <div class="modal-detail"><strong>Members:</strong> <br><span id="m-members" style="font-size: 13px; color: #aaa; line-height: 1.6; display: inline-block; margin-top: 5px;"></span></div>
                </div>
            </div>
            <p id="modalMsg" style="text-align: center; color: #bbb; margin-top: 15px; line-height: 1.5; font-size: 14px;"></p>
            
            <div id="action-container"></div>
        </div>
    </div>

    <script>
        // =========================================================
        // 1. NOCODB CONFIGURATION - PASTE YOUR DETAILS HERE
        // =========================================================
        const NOCODB_CONFIG = {
            baseURL: "https://data.nmf.ndmcbd.org/dashboard/#/nc/prxuekzqxii1tor/", 
            token: "AaO2qAXFeD-swNBHGSdJ5oTYU7jWrRGsvcxmke3D",
            tables: {
                participants: "mwpiygbw123apil",
                th_participants: "mgvp5u3p6ix6oz8",
                th_teams: "mdd0p2yurodsdww"
            }
        };

        let html5QrcodeScanner;
        let pendingCheckIn = { tableId: "", recordId: null }; 

        window.onload = () => {
            if (localStorage.getItem('guardLoggedIn') === 'true') {
                showScanner();
            }
        };

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('pin').value.trim();
            const msgEl = document.getElementById('login-message');

            const validGuards = { "admin": "1234", "gate1": "mathfest2026", "gate2": "mathfest2026" };

            if (validGuards[user] && validGuards[user] === pass) {
                localStorage.setItem('guardLoggedIn', 'true');
                showScanner();
                msgEl.innerText = "";
            } else {
                msgEl.innerText = "Access Denied.";
                msgEl.style.color = "#dc3545";
            }
        }

        function logout() {
            localStorage.removeItem('guardLoggedIn');
            location.reload();
        }

        function showScanner() {
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('scanner-section').classList.add('active');
            setTimeout(() => { document.getElementById('scanner-section').style.opacity = 1; }, 50);
        }

        // --- NOCODB API HELPER ---
        async function fetchFromNocoDB(tableId, whereQuery) {
            const url = `${NOCODB_CONFIG.baseURL}/${tableId}/records?where=${encodeURIComponent(whereQuery)}&limit=1`;
            const response = await fetch(url, {
                method: 'GET',
                headers: { 'xc-token': NOCODB_CONFIG.token, 'Content-Type': 'application/json' }
            });
            const data = await response.json();
            return data.list && data.list.length > 0 ? data.list[0] : null;
        }

        // --- STEP 1: VERIFY VIA NOCODB ---
        async function processScan(queryText, type = 'auto') {
            queryText = queryText.trim();
            if (!queryText) return;

            document.getElementById('scanBtn').style.display = "block";
            document.getElementById('loader').style.display = "block";
            
            try {
                // Format the NocoDB 'where' clause based on search type
                let whereQuery = "";
                if (type === "auto") {
                    whereQuery = `(nmf_id,eq,${queryText})~or(phone,eq,${queryText})`;
                } else {
                    whereQuery = `(${type},eq,${queryText})`;
                }

                // 1. Check Main Event Table
                let record = await fetchFromNocoDB(NOCODB_CONFIG.tables.participants, whereQuery);
                let isTreasureHunt = false;
                let activeTableId = NOCODB_CONFIG.tables.participants;

                // 2. If not found, check Treasure Hunt Table
                if (!record) {
                    record = await fetchFromNocoDB(NOCODB_CONFIG.tables.th_participants, whereQuery);
                    if (record) {
                        isTreasureHunt = true;
                        activeTableId = NOCODB_CONFIG.tables.th_participants;
                    }
                }

                document.getElementById('loader').style.display = "none";

                if (!record) {
                    return showModal({ success: false, canCheckIn: false, message: "Participant not found." });
                }

                // Gather details
                const payment = (record.payment_status || "unpaid").toLowerCase();
                const isAlreadyIn = (record.checked_in === true || record.checked_in === 1 || String(record.checked_in).toLowerCase() === "true");
                
                let detailsObj = {
                    name: record.full_name || "N/A",
                    id: record.nmf_id || "N/A",
                    institution: record.institution || "N/A",
                    type: isTreasureHunt ? "Treasure Hunt" : "Main Event",
                    teamName: "N/A",
                    teamMembers: "None listed"
                };

                // TH Specific: Fetch Team Data
                let teamStatus = "approved"; // Default for main event
                if (isTreasureHunt && record.team_id) {
                    const teamQuery = `(id,eq,${record.team_id})`;
                    const teamRecord = await fetchFromNocoDB(NOCODB_CONFIG.tables.th_teams, teamQuery);
                    
                    if (teamRecord) {
                        detailsObj.teamName = teamRecord.team_name || "N/A";
                        teamStatus = (teamRecord.status || "pending").toLowerCase();
                        
                        if (teamRecord.members_json) {
                            try {
                                const parsed = JSON.parse(teamRecord.members_json);
                                if (Array.isArray(parsed)) {
                                    detailsObj.teamMembers = parsed.map(m => m.name || m).join(", ");
                                } else {
                                    detailsObj.teamMembers = teamRecord.members_json;
                                }
                            } catch(e) { detailsObj.teamMembers = teamRecord.members_json; }
                        }
                    }
                }

                // Logic Checks (Paid OR Approved)
                const isIndivCleared = (payment === "paid" || payment === "approved");
                const isTeamCleared = (teamStatus === "approved" || teamStatus === "paid");

                if (!isIndivCleared) {
                    return showModal({ success: false, canCheckIn: false, message: `DENIED: INDIVIDUAL ${payment.toUpperCase()}`, details: detailsObj });
                }
                if (isTreasureHunt && !isTeamCleared) {
                    return showModal({ success: false, canCheckIn: false, message: `DENIED: TEAM ${teamStatus.toUpperCase()}`, details: detailsObj });
                }
                if (isAlreadyIn) {
                    return showModal({ success: false, canCheckIn: false, message: "ALREADY CHECKED IN!", details: detailsObj });
                }

                // All clear! Save the memory for the Check-In button
                pendingCheckIn = { tableId: activeTableId, recordId: record.id };
                showModal({ success: true, canCheckIn: true, message: "VERIFIED. AWAITING ENTRY.", details: detailsObj });

            } catch (error) {
                console.error(error);
                document.getElementById('loader').style.display = "none";
                showModal({ success: false, canCheckIn: false, message: "Network Error hitting NocoDB." });
            }
            
            document.getElementById('manualSearch').value = "";
        }

        // --- STEP 2: DISPLAY UI & BUTTONS ---
        function showModal(result) {
            const modal = document.getElementById('resultModal');
            const box = document.getElementById('modalBox');
            const detailsDiv = document.getElementById('participantDetails');
            const thDetails = document.getElementById('th-details');
            const actionContainer = document.getElementById('action-container');
            
            if (result.success && result.canCheckIn) box.className = "modal-content status-verified";
            else if (result.success) box.className = "modal-content status-success";
            else box.className = "modal-content status-error";
            
            document.getElementById('modalTitle').innerText = result.message;

            if (result.details) {
                detailsDiv.style.display = "block";
                document.getElementById('m-name').innerText = result.details.name;
                document.getElementById('m-id').innerText = result.details.id;
                document.getElementById('m-inst').innerText = result.details.institution;
                
                const typeSpan = document.getElementById('m-type');
                if (result.details.type) {
                    typeSpan.style.display = "inline-block";
                    typeSpan.innerText = result.details.type.toUpperCase();
                    typeSpan.className = "badge " + (result.details.type === "Treasure Hunt" ? "badge-th" : "badge-reg");
                    
                    if (result.details.type === "Treasure Hunt") {
                        thDetails.style.display = "block";
                        document.getElementById('m-team').innerText = result.details.teamName;
                        document.getElementById('m-members').innerText = result.details.teamMembers;
                    } else {
                        thDetails.style.display = "none";
                    }
                } else {
                    typeSpan.style.display = "none";
                    thDetails.style.display = "none";
                }
                document.getElementById('modalMsg').innerText = "";
            } else {
                detailsDiv.style.display = "none";
                document.getElementById('modalMsg').innerText = "Double check details.";
            }

            if (result.canCheckIn) {
                actionContainer.innerHTML = `
                    <div class="action-buttons">
                        <button class="success-btn" onclick="confirmCheckIn()" id="permitBtn">Permit Entry</button>
                        <button class="outline-btn" onclick="closeModal()">Deny / Cancel</button>
                    </div>
                `;
            } else {
                actionContainer.innerHTML = `<button onclick="closeModal()" style="margin-top: 20px;">Close & Next Scan</button>`;
            }

            modal.style.display = "flex";
        }

        // --- STEP 3: PATCH TO NOCODB ---
        async function confirmCheckIn() {
            const permitBtn = document.getElementById('permitBtn');
            permitBtn.innerText = "Confirming...";
            permitBtn.disabled = true;

            try {
                const url = `${NOCODB_CONFIG.baseURL}/${pendingCheckIn.tableId}/records`;
                const response = await fetch(url, {
                    method: 'PATCH',
                    headers: { 'xc-token': NOCODB_CONFIG.token, 'Content-Type': 'application/json' },
                    // NocoDB PATCH requires the primary key (id) and the fields to update
                    body: JSON.stringify({ id: pendingCheckIn.recordId, checked_in: true })
                });
                
                if (response.ok) {
                    document.getElementById('modalTitle').innerText = "ENTRY CONFIRMED!";
                    document.getElementById('modalBox').className = "modal-content status-success";
                    document.getElementById('action-container').innerHTML = `<button onclick="closeModal()" style="margin-top: 20px;">Close & Next Scan</button>`;
                } else {
                    alert("Database update failed. Try again.");
                    permitBtn.innerText = "Permit Entry";
                    permitBtn.disabled = false;
                }
            } catch (error) {
                alert("Network error during confirmation.");
                permitBtn.innerText = "Permit Entry";
                permitBtn.disabled = false;
            }
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = "none";
            pendingCheckIn = { tableId: "", recordId: null }; 
        }

        function handleManualSearch() {
            const query = document.getElementById('manualSearch').value;
            const searchType = document.getElementById('searchType').value;
            if (query) processScan(query, searchType);
        }

        function startScanner() {
            document.getElementById('scanBtn').style.display = "none";
            
            if (html5QrcodeScanner) {
                html5QrcodeScanner.clear().catch(e => console.log(e));
            }

            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (decodedText) => {
                    await html5QrcodeScanner.clear();
                    document.getElementById('scanBtn').style.display = "block";
                    await processScan(decodedText, 'auto');
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("Camera permission denied. Please allow camera access or use manual search.");
                document.getElementById('scanBtn').style.display = "block";
            });
        }

        async function handleFileUpload(event) {
            if (event.target.files.length == 0) return;
            const file = event.target.files[0];
            const tempScanner = new Html5Qrcode("reader");
            
            try {
                const decodedText = await tempScanner.scanFile(file, true);
                await processScan(decodedText, 'auto');
            } catch (err) {
                showModal({ success: false, message: "No QR code detected in the image." });
            }
            event.target.value = ''; 
        }
    </script>
</body>
</html>
