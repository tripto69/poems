<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NMF 2026 Gate Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* --- GLOBAL TRANSITION & THEME --- */
        * { transition: all 0.3s ease; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: rgb(14, 5, 29); color: #ffffff; }
        .container { max-width: 500px; margin: auto; padding: 20px; background: rgba(255, 255, 255, 0.05); border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }
        
        /* --- BUTTONS & INPUTS --- */
        button { padding: 15px 20px; margin: 10px 0; cursor: pointer; font-size: 16px; font-weight: bold; border-radius: 8px; border: none; background-color: rgb(231, 43, 85); color: white; width: 100%; }
        button:hover, button:active { background-color: rgb(200, 30, 70); transform: scale(0.98); }
        .outline-btn { background-color: transparent; border: 2px solid rgb(231, 43, 85); color: rgb(231, 43, 85); }
        
        input { width: 100%; padding: 14px; margin: 10px 0; background-color: rgb(25, 15, 45); color: white; border: 1px solid rgb(231, 43, 85); border-radius: 8px; font-size: 16px; outline: none; }
        input::placeholder { color: #888; }
        input:focus { box-shadow: 0 0 10px rgba(231, 43, 85, 0.5); }
        
        /* --- SECTIONS --- */
        #scanner-section, #login-section { display: none; opacity: 0; }
        .active { display: block !important; opacity: 1 !important; }
        
        /* --- SCANNER ELEMENTS --- */
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { margin: 0; }
        .search-box button { width: auto; margin: 0; padding: 12px 20px; }
        #reader { width: 100%; margin-top: 10px; background-color: #ffffff; border-radius: 8px; overflow: hidden; border: 2px solid rgb(231, 43, 85); }
        #loader { display: none; color: #0dcaf0; margin: 15px 0; font-weight: bold; font-size: 18px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* --- MODAL STYLES --- */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background: rgb(25, 15, 45); padding: 25px; border-radius: 12px; width: 100%; max-width: 400px; text-align: left; border: 3px solid; position: relative; }
        .modal-content h3 { margin-top: 0; text-align: center; font-size: 26px; text-transform: uppercase; letter-spacing: 1px; }
        .modal-detail { margin: 12px 0; font-size: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; color: #ddd; }
        .modal-detail strong { color: #fff; }
        
        /* --- BADGES & STATUS --- */
        .badge { display: inline-block; padding: 6px 12px; border-radius: 6px; font-size: 14px; font-weight: bold; float: right; letter-spacing: 0.5px; }
        .badge-th { background: #ffc107; color: #000; box-shadow: 0 0 10px rgba(255, 193, 7, 0.4); }
        .badge-reg { background: #0dcaf0; color: #000; box-shadow: 0 0 10px rgba(13, 202, 240, 0.4); }
        
        .status-success { border-color: #28a745; box-shadow: 0 0 30px rgba(40, 167, 69, 0.3); }
        .status-success h3 { color: #28a745; }
        .status-error { border-color: #dc3545; box-shadow: 0 0 30px rgba(220, 53, 69, 0.3); }
        .status-error h3 { color: #dc3545; }

        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        .header-bar h2 { margin: 0; font-size: 20px; }
        .logout-btn { background: transparent; border: 1px solid rgb(231, 43, 85); color: rgb(231, 43, 85); padding: 5px 12px; width: auto; font-size: 14px; margin: 0; }
    </style>
</head>
<body>

    <div class="container">
        <div id="login-section" class="active">
            <h2 style="margin-bottom: 5px;">National Math Festival</h2>
            <p style="color: #aaa; margin-top: 0; margin-bottom: 20px;">Gate Guard Portal</p>
            
            <input type="text" id="username" placeholder="Username">
            <input type="password" id="pin" placeholder="Password">
            <button onclick="login()">Access System</button>
            <div id="login-message" style="margin-top: 15px; font-weight: bold;"></div>
        </div>

        <div id="scanner-section">
            <div class="header-bar">
                <h2>Live Scanner</h2>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="manualSearch" placeholder="Enter ID or Phone...">
                <button onclick="handleManualSearch()">Search</button>
            </div>

            <div id="loader">Communicating with Database...</div>

            <div id="reader"></div>
            <button id="scanBtn" onclick="startScanner()" style="margin-top: 15px;">Open Camera</button>
            
            <p style="margin: 15px 0; color: #888; font-size: 14px;">— OR —</p>
            <input type="file" id="qr-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            <button class="outline-btn" onclick="document.getElementById('qr-upload').click()">Upload QR Image</button>
        </div>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="modal-content" id="modalBox">
            <h3 id="modalTitle">STATUS</h3>
            <div id="participantDetails" style="display: none;">
                <div class="modal-detail" style="border:none; padding-bottom:0; margin-top: 0;">
                    <span id="m-type" class="badge"></span>
                    <div style="clear:both;"></div>
                </div>
                <div class="modal-detail"><strong>Name:</strong> <span id="m-name"></span></div>
                <div class="modal-detail"><strong>ID:</strong> <span id="m-id"></span></div>
                <div class="modal-detail"><strong>Institution:</strong> <span id="m-inst"></span></div>
            </div>
            <p id="modalMsg" style="text-align: center; color: #ccc; margin-top: 15px; line-height: 1.4;"></p>
            <button onclick="closeModal()" style="margin-top: 20px;">Close & Next</button>
        </div>
    </div>

    <script>
        // =========================================================
        // 1. PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        // =========================================================
        const BACKEND_URL = "https://script.google.com/macros/s/AKfycbwOKwom1u44BA9HoQ5xtLtm2Iu9_CMxUZgWa-Dxp7POjJcCN8sK37yTcIlyVosildl0sA/exec"; 

        let html5QrcodeScanner;

        // =========================================================
        // 2. GUARD LOGIN LOGIC (Edit these credentials)
        // =========================================================
        window.onload = () => {
            if (localStorage.getItem('guardLoggedIn') === 'true') {
                showScanner();
            }
        };

        function login() {
            const user = document.getElementById('username').value.trim();
            const pass = document.getElementById('pin').value.trim();
            const msgEl = document.getElementById('login-message');

            // Set your guard usernames and passwords here
            const validGuards = {
                "admin": "tripto12608061",
                "volunteer1": "nmf_gv_001",
                "volunteer2": "nmf_gv_002"
            };

            if (validGuards[user] && validGuards[user] === pass) {
                localStorage.setItem('guardLoggedIn', 'true');
                showScanner();
            } else {
                msgEl.innerText = "Access Denied: Invalid Credentials.";
                msgEl.style.color = "#dc3545";
            }
        }

        function logout() {
            localStorage.removeItem('guardLoggedIn');
            location.reload();
        }

        function showScanner() {
            document.getElementById('login-section').classList.remove('active');
            document.getElementById('scanner-section').classList.add('active');
            setTimeout(() => { document.getElementById('scanner-section').style.opacity = 1; }, 50);
        }

        // =========================================================
        // 3. SCANNING & DATABASE LOGIC
        // =========================================================
        async function processScan(queryText) {
            queryText = queryText.trim();
            if (!queryText) return;

            document.getElementById('scanBtn').style.display = "block";
            document.getElementById('loader').style.display = "block";
            
            try {
                const response = await fetch(BACKEND_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ query: queryText }),
                    redirect: "follow"
                });
                
                const result = await response.json();
                document.getElementById('loader').style.display = "none";
                showModal(result);

            } catch (error) {
                document.getElementById('loader').style.display = "none";
                showModal({ success: false, message: "Network Error. Check WiFi/Data." });
            }
            
            document.getElementById('manualSearch').value = "";
        }

        function showModal(result) {
            const modal = document.getElementById('resultModal');
            const box = document.getElementById('modalBox');
            const detailsDiv = document.getElementById('participantDetails');
            
            box.className = "modal-content " + (result.success ? "status-success" : "status-error");
            document.getElementById('modalTitle').innerText = result.message;

            if (result.details) {
                detailsDiv.style.display = "block";
                document.getElementById('m-name').innerText = result.details.name || "N/A";
                document.getElementById('m-id').innerText = result.details.id || "N/A";
                document.getElementById('m-inst').innerText = result.details.institution || "N/A";
                
                const typeSpan = document.getElementById('m-type');
                if (result.details.type) {
                    typeSpan.style.display = "inline-block";
                    typeSpan.innerText = result.details.type.toUpperCase();
                    typeSpan.className = "badge " + (result.details.type === "Treasure Hunt" ? "badge-th" : "badge-reg");
                } else {
                    typeSpan.style.display = "none";
                }
                document.getElementById('modalMsg').innerText = "";
            } else {
                detailsDiv.style.display = "none";
                document.getElementById('modalMsg').innerText = "Double check the ID or Phone Number. Participant not found in the database.";
            }

            modal.style.display = "flex";
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = "none";
        }

        function handleManualSearch() {
            const query = document.getElementById('manualSearch').value;
            processScan(query);
        }

        function startScanner() {
            document.getElementById('scanBtn').style.display = "none";
            html5QrcodeScanner = new Html5Qrcode("reader");
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (decodedText) => {
                    html5QrcodeScanner.stop();
                    await processScan(decodedText);
                },
                (errorMessage) => {}
            ).catch(err => {
                alert("Camera permission denied. Please allow camera access or use manual search.");
                document.getElementById('scanBtn').style.display = "block";
            });
        }

        async function handleFileUpload(event) {
            if (event.target.files.length == 0) return;
            const file = event.target.files[0];
            const tempScanner = new Html5Qrcode("reader");
            
            try {
                const decodedText = await tempScanner.scanFile(file, true);
                await processScan(decodedText);
            } catch (err) {
                showModal({ success: false, message: "No QR code detected in the image." });
            }
            event.target.value = ''; // Reset file input
        }
    </script>
</body>
</html>
