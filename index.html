<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Guard Check-In Scanner</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        /* --- GLOBAL TRANSITION --- */
        * {
            transition: all 0.3s ease;
        }

        /* --- THEME --- */
        body { 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin-top: 20px; 
            background-color: rgb(14, 5, 29); 
            color: #ffffff; 
        }
        .container { 
            max-width: 500px; 
            margin: auto; 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 10px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* --- BUTTONS --- */
        button { 
            padding: 15px 20px; 
            margin: 10px 0; 
            cursor: pointer; 
            font-size: 16px; 
            font-weight: bold;
            border-radius: 5px; 
            border: none; 
            background-color: rgb(231, 43, 85); 
            color: white; 
            width: 100%;
        }
        button:hover, button:active {
            background-color: rgb(200, 30, 70); 
            transform: scale(0.98); 
        }

        .outline-btn {
            background-color: transparent;
            border: 2px solid rgb(231, 43, 85);
            color: rgb(231, 43, 85);
        }
        .outline-btn:hover, .outline-btn:active {
            background-color: rgba(231, 43, 85, 0.1);
        }
        
        /* --- INPUT FIELDS --- */
        input:not([type="file"]) { 
            width: 90%; 
            padding: 10px; 
            margin: 10px 0; 
            background-color: rgb(25, 15, 45); 
            color: white;
            border: 1px solid rgb(231, 43, 85); 
            border-radius: 5px; 
            font-size: 16px; 
            outline: none;
        }
        input::placeholder {
            color: #aaaaaa;
        }
        
        input:not([type="file"]):focus {
            background-color: rgb(45, 25, 75);
            box-shadow: 0 0 8px rgba(231, 43, 85, 0.5);
        }

        input:not(:placeholder-shown):not([type="file"]) {
            background-color: rgb(45, 25, 75); 
        }

        .event-logo {
            max-width: 150px; 
            margin-bottom: 10px;
        }
        
        /* --- SCANNER & MESSAGES --- */
        #reader { width: 100%; margin-top: 20px; background-color: #ffffff; border-radius: 5px; overflow: hidden; }
        #message, #login-message { font-weight: bold; font-size: 1.2em; margin-top: 20px; padding: 10px; border-radius: 5px;}
        .success { color: #155724; background-color: #d4edda; border: 1px solid #c3e6cb; }
        .error { color: #721c24; background-color: #f8d7da; border: 1px solid #f5c6cb; }
        
        /* Toggle views */
        #scanner-section, #login-section { display: none; opacity: 0; }
        .active { display: block !important; opacity: 1 !important; }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="logo.png" alt="Event Logo" class="event-logo">
        
        <h2>সাকেপ কাউকে QR ছাড়া ঢুকতে দেয় না</h2>

        <div id="login-section" class="active">
            <h3>Gate Slave Login</h3>
            <input type="text" id="username" placeholder="Username (e.g. Gate1)">
            <input type="password" id="pin" placeholder="PIN">
            <button onclick="login()">Login</button>
            <div id="login-message"></div>
        </div>

        <div id="scanner-section">
            <button onclick="logout()" style="background: transparent; border: 1px solid rgb(231, 43, 85); color: rgb(231, 43, 85); padding: 5px 15px; width: auto; float: right; font-size: 14px;">Logout</button>
            <div style="clear: both;"></div>
            
            <div id="reader"></div>
            <div id="message"></div>
            
            <button id="scanBtn" onclick="startScanner()">Start Camera</button>
            
            <p style="margin: 10px 0; color: #aaaaaa; font-size: 14px;">— OR —</p>
            
            <input type="file" id="qr-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event)">
            <button class="outline-btn" onclick="document.getElementById('qr-upload').click()">Upload QR Image</button>

        </div>
    </div>

    <script>
        // YOUR LIVE GOOGLE SCRIPT URL
        const GOOGLE_API_URL = 'https://script.google.com/macros/s/AKfycbyCYq1cJiVS_fQ7jyz32oA-sAwIQCkAO96E_7SDFe_w6ZDz2sfQPlMmNTJhasCXVpgWWQ/exec';
        let html5QrcodeScanner;

        window.onload = () => {
            if (localStorage.getItem('guardLoggedIn') === 'true') {
                showScanner();
            }
        };

        async function login() {
            const username = document.getElementById('username').value;
            const pin = document.getElementById('pin').value;
            const msgEl = document.getElementById('login-message');

            if (!username || !pin) {
                msgEl.innerText = "Please enter both Username and PIN.";
                msgEl.className = "error";
                return;
            }

            msgEl.innerText = "Verifying...";
            msgEl.className = "";

            try {
                const response = await fetch(`${GOOGLE_API_URL}?action=login&username=${encodeURIComponent(username)}&pin=${encodeURIComponent(pin)}`);
                const result = await response.json();

                if (result.success) {
                    localStorage.setItem('guardLoggedIn', 'true');
                    showScanner();
                } else {
                    msgEl.innerText = result.message;
                    msgEl.className = "error";
                }
            } catch (error) {
                msgEl.innerText = "Network error. Try again.";
                msgEl.className = "error";
            }
        }

        function logout() {
            localStorage.removeItem('guardLoggedIn');
            stopScanner();
            
            const scannerSec = document.getElementById('scanner-section');
            const loginSec = document.getElementById('login-section');
            
            scannerSec.style.opacity = 0;
            setTimeout(() => {
                scannerSec.classList.remove('active');
                loginSec.classList.add('active');
                setTimeout(() => loginSec.style.opacity = 1, 50);
            }, 300);

            document.getElementById('login-message').innerText = "";
            document.getElementById('login-message').className = "";
            document.getElementById('username').value = "";
            document.getElementById('pin').value = "";
        }

        function showScanner() {
            const scannerSec = document.getElementById('scanner-section');
            const loginSec = document.getElementById('login-section');
            
            loginSec.style.opacity = 0;
            setTimeout(() => {
                loginSec.classList.remove('active');
                scannerSec.classList.add('active');
                setTimeout(() => scannerSec.style.opacity = 1, 50);
            }, 300);
        }

        // --- CORE SCAN PROCESSING LOGIC ---
        async function processScan(decodedText) {
            document.getElementById('message').innerText = "Verifying ID...";
            document.getElementById('message').className = "";
            
            try {
                const response = await fetch(`${GOOGLE_API_URL}?action=scan&id=${encodeURIComponent(decodedText)}`);
                const result = await response.json();
                
                const msgEl = document.getElementById('message');
                msgEl.innerText = result.message;
                msgEl.className = result.success ? "success" : "error";
                
            } catch (error) {
                document.getElementById('message').innerText = "Network error. Try again.";
                document.getElementById('message').className = "error";
            }
            
            document.getElementById('scanBtn').innerText = "Scan Next Person";
            document.getElementById('scanBtn').style.display = "block";
        }

        // --- CAMERA SCANNER ---
        function startScanner() {
            document.getElementById('message').innerText = "";
            document.getElementById('message').className = "";
            document.getElementById('scanBtn').style.display = "none";
            
            html5QrcodeScanner = new Html5Qrcode("reader");
            
            html5QrcodeScanner.start(
                { facingMode: "environment" }, 
                { fps: 10, qrbox: { width: 250, height: 250 } },
                async (decodedText) => {
                    stopScanner(); 
                    await processScan(decodedText);
                },
                (errorMessage) => {}
            ).catch(err => alert("Camera permission denied."));
        }

        function stopScanner() {
            if (html5QrcodeScanner) {
                html5QrcodeScanner.stop().catch(err => console.error(err));
            }
        }

        // --- FILE UPLOAD SCANNER ---
        async function handleFileUpload(event) {
            if (event.target.files.length == 0) return;
            
            const file = event.target.files[0];
            const tempScanner = new Html5Qrcode("reader");
            
            document.getElementById('message').innerText = "Scanning image...";
            document.getElementById('message').className = "";
            stopScanner(); // Stop the live camera if it happens to be running
            document.getElementById('scanBtn').style.display = "block";
            
            try {
                const decodedText = await tempScanner.scanFile(file, true);
                await processScan(decodedText);
            } catch (err) {
                document.getElementById('message').innerText = "No QR code found in the image.";
                document.getElementById('message').className = "error";
            }
            
            // Reset the input field so the same file can be selected again if needed
            event.target.value = '';
        }
    </script>
</body>
</html>
